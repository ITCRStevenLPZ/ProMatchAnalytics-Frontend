name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

env:
  NODE_VERSION: '18'

jobs:
  # ── Resolve which environment to target ──────────────────────────────
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      hosting_target: ${{ steps.set.outputs.hosting_target }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
          else
            ENV="development"
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"

          if [[ "$ENV" == "production" ]]; then
            echo "hosting_target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "hosting_target=dev" >> "$GITHUB_OUTPUT"
          fi

  # ── Test & Build ─────────────────────────────────────────────────────
  test-and-build:
    name: Test & Build (${{ needs.resolve-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [resolve-env]
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || echo "⚠️ Linting not configured"
        continue-on-error: true

      - name: Run Tests
        run: npm test || echo "⚠️ Tests not configured"
        continue-on-error: true

      - name: Build Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Deploy ───────────────────────────────────────────────────────────
  deploy-firebase:
    name: Deploy to Firebase (${{ needs.resolve-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [test-and-build, resolve-env]
    environment: ${{ needs.resolve-env.outputs.environment }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live
          target: ${{ needs.resolve-env.outputs.hosting_target }}

      - name: Show Deployment Info
        run: |
          if [[ "${{ needs.resolve-env.outputs.environment }}" == "production" ]]; then
            echo "🚀 Deployed to PRODUCTION"
            echo "URL: https://promatchanalytics.com"
          else
            echo "🚀 Deployed to DEVELOPMENT"
            echo "URL: https://dev.promatchanalytics.com"
          fi

      - name: Post Deployment Comment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.resolve-env.outputs.environment }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const url = env === 'production'
              ? 'https://promatchanalytics.com'
              : 'https://dev.promatchanalytics.com';
            const output = `### 🎨 Frontend Deployed Successfully!

            **Environment**: \`${env}\`
            **Commit**: \`${sha}\`
            **URL**: ${url}

            Deployed by @${{ github.actor }}`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: output
            });

  # ── PR Preview (always uses dev environment) ─────────────────────────
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: development
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install and Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build

      - name: Deploy Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          target: dev
          expires: 7d
